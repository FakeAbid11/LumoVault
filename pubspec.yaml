name: lumovault
description: "LumoVault — Original quality photo and video backup powered by Telegram."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Database
  drift: ^2.20.0
  sqlite3: ^2.4.0
  sqlite3_flutter_libs: ^0.5.24

  # Background Work
  workmanager: ^0.9.0

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # TDLib - Telegram client
  tdlib: ^1.6.0

  # Permissions
  permission_handler: ^11.4.0

  # Image Loading
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0

  # Media Scanning
  photo_manager: ^3.2.0

  # Video
  video_player: ^2.9.3

  # Utilities
  path_provider: ^2.1.5
  device_info_plus: ^11.3.0
  connectivity_plus: ^6.1.3
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  intl: ^0.20.2
  crypto: ^3.0.3
  convert: ^3.1.1
  path: ^1.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter

  # Drift code generation
  drift_dev: ^2.20.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
