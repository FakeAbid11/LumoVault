name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.44.6'

jobs:
  analyze:
    name: Analyze & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: dart analyze --fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          flags: unittests
        continue-on-error: true

  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (debug)
        env:
          LUMOVAULT_TELEGRAM_API_ID: ${{ secrets.LUMOVAULT_TELEGRAM_API_ID }}
          LUMOVAULT_TELEGRAM_API_HASH: ${{ secrets.LUMOVAULT_TELEGRAM_API_HASH }}
        run: |
          flutter build apk --debug --verbose \
            --dart-define=LUMOVAULT_TELEGRAM_API_ID="$LUMOVAULT_TELEGRAM_API_ID" \
            --dart-define=LUMOVAULT_TELEGRAM_API_HASH="$LUMOVAULT_TELEGRAM_API_HASH" \
            > build.log 2>&1 || {
            echo "## Build Failed - Full build.log (last 120 lines):"
            echo '```'
            tail -n 120 build.log
            echo '```'
            echo "## Build Failed - Key Errors:"
            echo '```'
            grep -iE "what went wrong|FAILURE:|could not|error:|Exception|Execution failed|problem occurred|unresolved|incompatible|requires|minimum" build.log | head -n 60
            echo '```'
            exit 1
          }

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: build-log-${{ github.sha }}
          path: build.log
          retention-days: 7

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 14
